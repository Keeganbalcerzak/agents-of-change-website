        - generic [ref=e399]:
          - generic [ref=e400]: Breaking down the questions was the foundational skill I needed and which I used throughout the actual exam. Then organizing the content in Agents of Change was helpful as it allowed me to go through 2 1/2 years of coursework and organize my thinking through your modules. I loved the practice questions and although the actual exam questions were different, I was able to apply practical knowledge from my studies from class and your modules to pass.
          - generic [ref=e401]:
            - img "IMG_3015 – Alicia Gramins" [ref=e403]
            - heading "Mastered Question Strategy, Passed with Confidence" [level=3] [ref=e405]
        - generic [ref=e408]:
          - generic [ref=e409]: Agents of Change played a huge role in helping me pass my LMSW exam. The live sessions made the material feel manageable and engaging, and the practice questions were key to my success. I didn’t just memorize information, I learned how to think through questions the way the exam requires. The detailed explanations helped me understand my reasoning and improve with every section. By the time I took the test, I felt confident and prepared, and I credit this program for that!
          - generic [ref=e410]:
            - img "Grijalva__Maria – Maria Grijalva" [ref=e412]
            - heading "Built Confidence and Passed the LMSW Exam!" [level=3] [ref=e414]
        - generic [ref=e417]:
          - generic [ref=e418]: I really loved all of Agents of Change. The Agents of Change program was incredibly helpful for me because it gave me a structured and realistic way to prepare for the ASWB exam. What stood out the most was how the material broke down complex concepts into clear explanations that actually made sense. Instead of just memorizing information, I felt like I was learning how to think through the questions, which made a big difference in my confidence. The practice questions and mock exams were especially valuable. They were very similar to the style of the real exam, which helped me understand how questions are worded and what the exam is really asking. After each practice session, reviewing the rationales helped me see why the correct answer was right and why the others were not. Another thing that helped me was the way the program organized the study material. It made studying feel manageable instead of overwhelming.
          - generic [ref=e419]:
            - img "IMG_0987 – Rebecca Trujillo (1)" [ref=e421]
            - heading "Structured, Clear Prep Built My Confidence and ASWB Exam Skills" [level=3] [ref=e423]
        - generic [ref=e426]:
          - generic [ref=e427]: The audio files from Agents of Change and the breakdown of how to approach the questions/vignettes were especially helpful, as I’m an audio learner. The live study groups on Sunday helped build my confidence with engaging in the comment sections and able to provide rationale as to why I chose my answer. Dr. Meagan’s breakdown of questions with the highlighting key points, and also reading the questions twice before answering also helped me feel confident for test day!
          - generic [ref=e428]:
            - img "IMG_9456 – Shameeka Butler (1)" [ref=e430]
